name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.75.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Check all chapters
        run: |
          for dir in ch*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "::group::cargo check — $dir"
              (cd "$dir" && cargo check --all-targets)
              echo "::endgroup::"
            fi
          done

      - name: Clippy (stable only)
        if: matrix.rust == 'stable'
        run: |
          for dir in ch*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "::group::clippy — $dir"
              (cd "$dir" && cargo clippy -- -D warnings)
              echo "::endgroup::"
            fi
          done

      - name: Format check (stable only)
        if: matrix.rust == 'stable'
        run: |
          for dir in ch*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "::group::rustfmt — $dir"
              (cd "$dir" && cargo fmt -- --check)
              echo "::endgroup::"
            fi
          done

      - name: Test all chapters
        run: |
          for dir in ch*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "::group::cargo test — $dir"
              (cd "$dir" && cargo test)
              echo "::endgroup::"
            fi
          done
